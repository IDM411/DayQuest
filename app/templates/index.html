<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayQuest — Right Now</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <main>
      <!-- Right Now: the single focus of the page -->
      <section id="right-now" aria-live="polite">
        <div class="eyebrow-row">
          <span class="eyebrow-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M19.1 4.9 17 7M7 17l-2.1 2.1" />
            </svg>
          </span>
          <p class="eyebrow">Right Now</p>
        </div>

        <div id="rn-task" class="rn-card" hidden>
          <h1 id="rn-title"></h1>
          <p id="rn-first-step" class="first-step"></p>
          <p id="rn-time" class="time-range"></p>
          <div class="actions">
            <button id="done-btn" type="button" class="primary">Done</button>
            <button id="push-btn" type="button" class="ghost">Push</button>
          </div>
          <p id="rn-error" class="error" hidden></p>
        </div>

        <div id="rn-empty" class="rn-card rn-card--empty" hidden>
          <h1 class="muted">Nothing scheduled right now.</h1>
          <p class="muted">You're clear. Add something below, or take a break.</p>
        </div>
      </section>

      <!-- Primary capture: one free-text box that figures out the rest -->
      <form id="capture-form" class="add-form form-capture">
        <div class="form-head">
          <span class="form-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 3v18M3 12h18" />
            </svg>
          </span>
          <h2>Got something new? Type it in.</h2>
        </div>
        <input
          id="capture-input"
          name="text"
          type="text"
          placeholder="e.g. report due thursday"
          autocomplete="off"
          required
        />
        <button type="submit" class="primary">Add</button>
        <p id="capture-msg" class="form-msg" hidden></p>
      </form>

      <!-- Fallback: manual forms, in case parsing gets something wrong -->
      <details id="add-panel">
        <summary>Add manually (advanced)</summary>

        <div class="forms">
          <form id="commitment-form" class="add-form form-commitment">
            <div class="form-head">
              <span class="form-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M12 7v5l3 2" />
                </svg>
              </span>
              <h2>Fixed Commitment</h2>
            </div>
            <label>
              Title
              <input name="title" type="text" required />
            </label>
            <label>
              Day of week
              <select name="day_of_week" required>
                <option value="0">Monday</option>
                <option value="1">Tuesday</option>
                <option value="2">Wednesday</option>
                <option value="3">Thursday</option>
                <option value="4">Friday</option>
                <option value="5">Saturday</option>
                <option value="6">Sunday</option>
              </select>
            </label>
            <div class="row">
              <label>
                Start
                <input name="start_time" type="time" required />
              </label>
              <label>
                End
                <input name="end_time" type="time" required />
              </label>
            </div>
            <button type="submit" class="ghost">Add commitment</button>
            <p class="form-msg" hidden></p>
          </form>

          <form id="obligation-form" class="add-form form-obligation">
            <div class="form-head">
              <span class="form-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 3v18" />
                  <path d="M4 4h13l-2 4 2 4H4" />
                </svg>
              </span>
              <h2>Obligation</h2>
            </div>
            <label>
              Title
              <input name="title" type="text" required />
            </label>
            <label>
              First step
              <input name="first_step" type="text" required />
            </label>
            <label>
              Deadline
              <input name="deadline" type="datetime-local" required />
            </label>
            <label>
              Estimated effort (minutes)
              <input name="estimated_effort_minutes" type="number" min="1" required />
            </label>
            <button type="submit" class="ghost">Add obligation</button>
            <p class="form-msg" hidden></p>
          </form>

          <form id="goal-form" class="add-form form-goal">
            <div class="form-head">
              <span class="form-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9" />
                  <circle cx="12" cy="12" r="5" />
                  <circle cx="12" cy="12" r="1" />
                </svg>
              </span>
              <h2>Goal</h2>
            </div>
            <label>
              Title
              <input name="title" type="text" required />
            </label>
            <label>
              Estimated total effort (hours)
              <input name="estimated_total_effort_hours" type="number" min="0.25" step="0.25" required />
            </label>
            <label>
              Target date
              <input name="soft_target_date" type="date" required />
            </label>
            <button type="submit" class="ghost">Add goal</button>
            <p class="form-msg" hidden></p>
          </form>
        </div>
      </details>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
